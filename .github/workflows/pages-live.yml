name: Deploy (live) to GitHub Pages

on:
  push:
    branches: ["live"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Pull LFS objects
        run: git lfs pull

      - name: Resolve Supabase env
        env:
          SECRET_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SECRET_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VAR_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VAR_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          RESOLVED_URL="${SECRET_SUPABASE_URL:-$VAR_SUPABASE_URL}"
          RESOLVED_KEY="${SECRET_SUPABASE_ANON_KEY:-$VAR_SUPABASE_ANON_KEY}"
          test -n "$RESOLVED_URL" || (echo "Missing VITE_SUPABASE_URL (set Actions secret or variable)." && exit 1)
          test -n "$RESOLVED_KEY" || (echo "Missing VITE_SUPABASE_ANON_KEY (set Actions secret or variable)." && exit 1)
          {
            echo "VITE_SUPABASE_URL=$RESOLVED_URL"
            echo "VITE_SUPABASE_ANON_KEY=$RESOLVED_KEY"
          } >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Verify runtime assets in dist
        run: |
          test -d dist/assets-runtime
          test -f dist/assets-runtime/projectiles/knife.png
          test -f dist/assets-runtime/entities/player/jack/rotations/north.png
          test -f dist/assets-runtime/base_db32/tiles/floor/sidewalk/1.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
