<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rat Noir Survivors — Prototype</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0b0f; overflow: hidden; }
    #hud { position: fixed; left: 12px; top: 12px; color: #eaeaf2; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; font-size: 14px; line-height: 1.4; user-select: none; z-index: 3; }
    #hud .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,0.08); margin-right: 8px; }

    /* HUD inventory (weapons + items) */
    #hudTop { display: inline-block; }

    #hud .hudInv {
      margin-top: 8px;
      display: flex;
      flex-direction: column; /* NEW: stack vertically */
      gap: 10px;
      align-items: stretch;
      max-width: min(860px, calc(100vw - 24px));
    }

    #hud .invCol {
      padding: 8px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      width: 100%;          /* NEW */
      min-width: 0;         /* NEW: prevents forcing side-by-side */
      box-sizing: border-box;
    }


    #hud .invLabel {
      font-size: 12px;
      font-weight: 900;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    #hud .invGrid {
      display: grid;
      grid-template-columns: repeat(4, minmax(78px, 1fr));
      gap: 8px;
    }

    #hud .slot {
      padding: 6px 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      min-height: 34px;
    }

    #hud .slot.empty { opacity: 0.45; }

    #hud .slotTitle {
      font-weight: 900;
      font-size: 12px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    #hud .slotSub {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
    }


    canvas { display:block; }

    /* IMPORTANT: ensure hidden attribute actually hides overlays (CSS IDs otherwise override it) */
    [hidden] { display: none !important; }

    /* Menu */
    #menu { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(0,0,0,0.55); z-index: 4; }
    #menu .panel { width: min(560px, 92vw); padding: 20px; border-radius: 16px; background: rgba(255,255,255,0.06); color: #eaeaf2; font-family: ui-sans-serif, system-ui; }
    #menu .title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    #menu .subline { opacity: 0.9; margin-bottom: 14px; }

    /* Weapon picker */
    #weaponPickerLabel { font-weight: 800; margin: 12px 0 8px; }
    #weaponChoices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (max-width: 520px) { #weaponChoices { grid-template-columns: 1fr; } }

    .wpnBtn {
      text-align: left;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      color: #fff;
      transition: transform 80ms ease, background 120ms ease, border-color 120ms ease;
    }
    .wpnBtn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.18); }
    .wpnBtn[aria-pressed="true"] { border-color: rgba(255,255,255,0.36); background: rgba(255,255,255,0.14); }
    .wpnTitle { font-weight: 900; font-size: 14px; margin-bottom: 2px; }
    .wpnDesc { opacity: 0.9; font-size: 12px; line-height: 1.35; }

    #menu button#startBtn { margin-top: 14px; width: 100%; padding: 12px 14px; border-radius: 12px; border: 0; cursor: pointer; font-weight: 800; background: rgba(255,255,255,0.16); color: #fff; }

    /* Run end overlay (WIN / LOSE) */
    #end { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(0,0,0,0.62); z-index: 7; }
    #end .panel { width: min(560px, 92vw); padding: 20px; border-radius: 16px; background: rgba(255,255,255,0.06); color: #eaeaf2; font-family: ui-sans-serif, system-ui; }
    #end .title { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
    #end .subline { opacity: 0.92; margin-bottom: 14px; white-space: pre-wrap; }
    #end button#endBtn { margin-top: 14px; width: 100%; padding: 12px 14px; border-radius: 12px; border: 0; cursor: pointer; font-weight: 900; background: rgba(255,255,255,0.16); color: #fff; }

    /* Level-up overlay */
    #levelup { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(0,0,0,0.62); z-index: 5; }
    #levelup .panel { width: min(720px, 94vw); padding: 20px; border-radius: 16px; background: rgba(255,255,255,0.06); color: #eaeaf2; font-family: ui-sans-serif, system-ui; }
    #levelup .title { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
    #levelup .sub { opacity: 0.9; margin-bottom: 14px; }

    /* Map overlay (shown between floors) */
    #map { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(0,0,0,0.62); z-index: 6; }
    #map .panel { width: min(860px, 96vw); padding: 20px; border-radius: 16px; background: rgba(255,255,255,0.06); color: #eaeaf2; font-family: ui-sans-serif, system-ui; }
    #map .title { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
    #map .sub { opacity: 0.9; margin-bottom: 14px; white-space: pre-wrap; }

    #mapGraphWrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1000 / 520;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.22);
      overflow: hidden;
    }

    #mapSvg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #mapHit {
      position: absolute;
      inset: 0;
    }

    .mapHitBtn {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 150px;
      height: 70px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      color: #fff;
      cursor: pointer;
      text-align: left;
      padding: 10px 12px;
    }

    .mapHitBtn:hover { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.10); }
    .mapHitBtn[disabled] { cursor: not-allowed; opacity: 0.45; }
    .mapHitTitle { font-weight: 900; font-size: 14px; margin-bottom: 4px; }
    .mapHitDesc { opacity: 0.9; font-size: 12px; line-height: 1.25; }

    #luChoices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .choiceBtn {
      text-align: left;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      color: #fff;
      transition: transform 80ms ease, background 120ms ease, border-color 120ms ease;
    }
    .choiceBtn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.18); }
    .choiceTitle { font-weight: 900; font-size: 16px; margin-bottom: 4px; }
    .choiceDesc { opacity: 0.9; font-size: 13px; line-height: 1.35; }
    @media (max-width: 720px) {
      #luChoices { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" hidden>
  <div id="hudTop">
    <span class="pill" id="timePill">00:00</span>
    <span class="pill" id="killsPill">Kills: 0</span>
    <span class="pill" id="hpPill">HP: 0/0</span>
    <span class="pill" id="lvlPill">Lv: 1</span>
  </div>

  <div class="hudInv">
    <div class="invCol">
      <div class="invLabel">Weapons</div>
      <div class="invGrid" id="weaponSlots">
        <div class="slot empty"><div class="slotTitle">—</div><div class="slotSub"></div></div>
        <div class="slot empty"><div class="slotTitle">—</div><div class="slotSub"></div></div>
        <div class="slot empty"><div class="slotTitle">—</div><div class="slotSub"></div></div>
        <div class="slot empty"><div class="slotTitle">—</div><div class="slotSub"></div></div>
      </div>
    </div>

    <div class="invCol">
      <div class="invLabel">Items</div>
      <div class="invGrid" id="itemSlots">
        <div class="slot empty"><div class="slotTitle">—</div><div class="slotSub"></div></div>
        <div class="slot empty"><div class="slotTitle">—</div><div class="slotSub"></div></div>
        <div class="slot empty"><div class="slotTitle">—</div><div class="slotSub"></div></div>
        <div class="slot empty"><div class="slotTitle">—</div><div class="slotSub"></div></div>
      </div>
    </div>
  </div>
</div>


<div id="levelup" hidden>
  <div class="panel">
    <div class="title">Level Up</div>
    <div class="sub" id="luSub">Choose an upgrade</div>
    <div id="luChoices"></div>
  </div>
</div>

<div id="map" hidden>
  <div class="panel">
    <div class="title">Choose your route</div>
    <div class="sub" id="mapSub">Pick a starting location.</div>

    <div id="mapGraphWrap">
      <svg id="mapSvg" viewBox="0 0 1000 520" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="mapHit"></div>
    </div>
  </div>
</div>

<div id="end" hidden>
  <div class="panel">
    <div class="title" id="endTitle">Run complete!</div>
    <div class="subline" id="endSubline"></div>
    <button id="endBtn" type="button">Back to Menu</button>
  </div>
</div>

<div id="menu">
  <div class="panel">
    <div class="title">Rat Noir Survivors</div>
    <div class="subline" id="menuSubline">Slice v0.1 — Docks (8 min → boss).</div>

    <div id="weaponPickerLabel">Starter weapon</div>
    <div id="weaponChoices"></div>

    <button id="startBtn">Start Run</button>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
